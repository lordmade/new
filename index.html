<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTech Solutions — Dynamic IT</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Manrope:wght@800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    /* Reusing your premium CSS from previous steps */
    :root { --primary: #0066ff; --dark: #0f172a; --light: #f8fafc; }
    body { font-family: 'Inter', sans-serif; background: var(--light); margin: 0; }
    
    #hero { 
      height: 100vh; display: flex; align-items: center; justify-content: center; 
      text-align: center; color: white; position: relative; background: #000;
      transition: background 0.5s ease-in-out;
    }
    .hero-overlay { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.8); z-index: 1; }
    .hero-content { position: relative; z-index: 2; max-width: 800px; padding: 20px; }
    
    .text-gradient { background: linear-gradient(135deg, #60a5fa, #0066ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .services-grid { 
      display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
      gap: 20px; padding: 50px 20px; max-width: 1200px; margin: 0 auto; 
    }
    .service-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
    
    /* Loading state */
    .skeleton { background: #e2e8f0; color: transparent !important; border-radius: 4px; animate: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  </style>
</head>
<body>

  <section id="hero">
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div id="db-badge" class="badge skeleton" style="display:inline-block; padding: 5px 15px; margin-bottom: 20px; border-radius: 20px; border: 1px solid #60a5fa;">Loading...</div>
      <h1 style="font-size: 3.5rem; font-family: 'Manrope'; margin-bottom: 20px;">
        <span id="db-title-main">...</span> 
        <span id="db-title-gradient" class="text-gradient">...</span>
      </h1>
      <p id="db-description" style="font-size: 1.2rem; opacity: 0.8; margin-bottom: 30px;">Loading content from database...</p>
    </div>
  </section>

  <section>
    <h2 style="text-align:center; font-family: 'Manrope'; padding-top: 50px;">Our Services</h2>
    <div class="services-grid" id="services-container">
      </div>
  </section>

  <script>
    // 1. Firebase Configuration (Replace with YOUR actual config from Firebase Console)
   const firebaseConfig = {
  apiKey: "AIzaSyAxBT0oESoL62oz_x_Z8cMtdENWZPx4tMI",
  authDomain: "pinotp-d7ef5.firebaseapp.com",
  databaseURL: "https://pinotp-d7ef5-default-rtdb.firebaseio.com",
  projectId: "pinotp-d7ef5",
  storageBucket: "pinotp-d7ef5.firebasestorage.app",
  messagingSenderId: "708458917827",
  appId: "1:708458917827:web:375de278577df0adcf9776"
};
    // 2. Cloudinary Configuration
    const CLOUD_NAME = "dqkujefxj";

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Function to generate Cloudinary URL
    const getCloudinaryUrl = (publicId) => {
      return `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/f_auto,q_auto,w_1920/${publicId}`;
    };

    // 3. Sync Hero Section
    db.ref('homepage/hero').on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        document.getElementById('db-badge').innerText = data.badge;
        document.getElementById('db-badge').classList.remove('skeleton');
        document.getElementById('db-title-main').innerText = data.titleMain;
        document.getElementById('db-title-gradient').innerText = data.titleGradient;
        document.getElementById('db-description').innerText = data.description;
        
        // Update Hero Background via Cloudinary
        const heroSection = document.getElementById('hero');
        const imgUrl = getCloudinaryUrl(data.bgImageId);
        heroSection.style.background = `url('${imgUrl}') center/cover no-repeat`;
      }
    });

    // 4. Sync Services Section
    db.ref('homepage/services').on('value', (snapshot) => {
      const services = snapshot.val();
      const container = document.getElementById('services-container');
      container.innerHTML = ''; // Clear skeleton

      if (services) {
        services.forEach(service => {
          container.innerHTML += `
            <div class="service-card">
              <i class="fas ${service.icon}" style="font-size: 2rem; color: var(--primary); margin-bottom: 15px;"></i>
              <h3 style="font-family: 'Manrope'; margin-bottom: 10px;">${service.title}</h3>
              <p style="font-size: 0.9rem; color: #64748b;">${service.desc}</p>
            </div>
          `;
        });
      }
    });
  </script>
</body>
</html>
