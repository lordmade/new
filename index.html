<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MTech Solutions | Premium IT & Software</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

  <style>
    :root {
      --primary: #0066ff;
      --dark: #0f172a;
      --light: #f8fafc;
      --glass: rgba(255, 255, 255, 0.8);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--dark); overflow-x: hidden; }

    /* --- Original Pill Navbar --- */
    header {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      width: 90%; max-width: 1100px; z-index: 1000;
      background: var(--glass); backdrop-filter: blur(15px);
      padding: 12px 30px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.3);
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }
    .logo img { height: 35px; display: block; }
    .nav-links { display: flex; gap: 25px; list-style: none; }
    .nav-links a { text-decoration: none; color: var(--dark); font-weight: 600; font-size: 0.95rem; transition: 0.3s; }
    .nav-links a:hover { color: var(--primary); }
    .btn-contact { background: var(--dark); color: white !important; padding: 10px 22px; border-radius: 999px; }

    /* --- Dynamic Hero Section --- */
    #hero {
      height: 100vh; width: 100%;
      display: flex; align-items: center; justify-content: center;
      text-align: center; color: white; position: relative;
      background-size: cover; background-position: center;
      transition: background 0.8s ease-in-out;
    }
    #hero::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(15,23,42,0.7), rgba(15,23,42,0.9));
      z-index: 1;
    }
    .hero-content { position: relative; z-index: 2; max-width: 900px; padding: 0 20px; }
    
    .badge {
      display: inline-block; padding: 6px 18px; border-radius: 999px;
      background: rgba(0, 102, 255, 0.1); border: 1px solid var(--primary);
      color: var(--primary); font-weight: 700; font-size: 0.8rem;
      text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px;
    }
    .hero-content h1 { font-family: 'Manrope'; font-size: clamp(2.5rem, 6vw, 4.5rem); line-height: 1.1; margin-bottom: 20px; }
    .text-gradient { background: linear-gradient(135deg, #60a5fa, #0066ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero-content p { font-size: 1.2rem; opacity: 0.9; max-width: 600px; margin: 0 auto 40px; }

    /* --- Services Section --- */
    #services { padding: 100px 20px; max-width: 1200px; margin: 0 auto; }
    .section-title { text-align: center; margin-bottom: 60px; }
    .section-title h2 { font-family: 'Manrope'; font-size: 2.5rem; }
    
    .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
    .service-card {
      background: white; padding: 40px; border-radius: 24px;
      border: 1px solid #e2e8f0; transition: 0.4s;
    }
    .service-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); border-color: var(--primary); }
    .service-card i { font-size: 2.5rem; color: var(--primary); margin-bottom: 25px; display: block; }
    .service-card h3 { font-family: 'Manrope'; font-size: 1.4rem; margin-bottom: 15px; }
    .service-card p { color: #64748b; line-height: 1.7; }

    /* Loading States */
    .skeleton-text { background: rgba(255,255,255,0.1); color: transparent !important; border-radius: 4px; }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo"><img src="https://raregradetech.com/wp-content/uploads/2025/01/Untitled-design-1024x1024.png" alt="MTech"></a>
    <ul class="nav-links">
      <li><a href="#hero">Home</a></li>
      <li><a href="#services">Services</a></li>
      <li><a href="shop.html">Shop</a></li>
      <li><a href="#" class="btn-contact">Get in Touch</a></li>
    </ul>
  </header>

  <section id="hero">
    <div class="hero-content">
      <span id="db-badge" class="badge">Loading...</span>
      <h1 id="hero-title">
        <span id="db-title-main" class="skeleton-text">Engaging Title</span><br>
        <span id="db-title-gradient" class="text-gradient skeleton-text">Wait for it...</span>
      </h1>
      <p id="db-description" class="skeleton-text">Our database is fetching the latest innovation news for your business.</p>
      <div class="hero-btns">
        <a href="shop.html" class="btn-contact" style="padding: 15px 35px; font-size: 1rem; text-decoration: none;">View Catalog</a>
      </div>
    </div>
  </section>

  <section id="services">
    <div class="section-title">
      <span style="color: var(--primary); font-weight: 700;">EXPERTISE</span>
      <h2>Our Core Solutions</h2>
    </div>
    <div class="services-grid" id="services-container">
      </div>
  </section>

  <script>
    // Firebase Config (Your specific credentials)
    const firebaseConfig = {
      apiKey: "AIzaSyAxBT0oESoL62oz_x_Z8cMtdENWZPx4tMI",
      authDomain: "pinotp-d7ef5.firebaseapp.com",
      databaseURL: "https://pinotp-d7ef5-default-rtdb.firebaseio.com",
      projectId: "pinotp-d7ef5",
      storageBucket: "pinotp-d7ef5.firebasestorage.app",
      messagingSenderId: "708458917827",
      appId: "1:708458917827:web:375de278577df0adcf9776"
    };

    const CLOUD_NAME = "dqkujefxj";
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Fetch Hero Content
    db.ref('homepage/hero').on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        document.getElementById('db-badge').innerText = data.badge;
        document.getElementById('db-title-main').innerText = data.titleMain;
        document.getElementById('db-title-main').classList.remove('skeleton-text');
        document.getElementById('db-title-gradient').innerText = data.titleGradient;
        document.getElementById('db-title-gradient').classList.remove('skeleton-text');
        document.getElementById('db-description').innerText = data.description;
        document.getElementById('db-description').classList.remove('skeleton-text');
        
        // Update Cloudinary Background
        const hero = document.getElementById('hero');
        hero.style.backgroundImage = `url('https://res.cloudinary.com/${CLOUD_NAME}/image/upload/f_auto,q_auto,w_1920/${data.bgImageId}')`;
      }
    });

    // Fetch Services
    db.ref('homepage/services').on('value', (snapshot) => {
      const services = snapshot.val();
      const container = document.getElementById('services-container');
      if (services) {
        container.innerHTML = services.map(s => `
          <div class="service-card">
            <i class="fas ${s.icon}"></i>
            <h3>${s.title}</h3>
            <p>${s.desc}</p>
          </div>
        `).join('');
      }
    });
  </script>
</body>
</html>
