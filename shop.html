<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MTech Premium Shop — Hardware & Software</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --primary: #0066ff;
      --primary-dark: #0044cc;
      --accent: #00f2fe;
      --dark: #0f172a;
      --light: #ffffff;
      --bg: #f1f5f9;
      --border: #e2e8f0;
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      --green: #22c55e;
      --orange: #f97316;
      --red: #ef4444;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--dark); }

    /* --- Advanced Navbar --- */
    header { 
      background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px);
      padding: 1rem 0; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000;
    }
    .nav-container { max-width: 1400px; margin: 0 auto; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .logo img { height: 35px; }

    .search-bar { 
      flex-grow: 1; max-width: 500px; position: relative; 
      display: flex; align-items: center; background: var(--bg); border-radius: 12px; padding: 0 15px;
    }
    .search-bar input { width: 100%; padding: 12px; border: none; background: transparent; outline: none; font-size: 0.95rem; }
    .search-bar i { color: var(--primary); }

    .nav-actions { display: flex; gap: 15px; }
    .nav-btn { position: relative; width: 45px; height: 45px; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); transition: 0.3s; }
    .nav-btn:hover { border-color: var(--primary); color: var(--primary); }
    .badge-count { position: absolute; top: -5px; right: -5px; background: var(--primary); color: white; font-size: 0.7rem; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; }

    /* --- Shop Layout --- */
    main { max-width: 1400px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 280px 1fr; gap: 40px; }

    /* Sidebar Filters */
    .sidebar { position: sticky; top: 100px; height: fit-content; }
    .filter-group { background: white; padding: 25px; border-radius: 20px; border: 1px solid var(--border); margin-bottom: 20px; }
    .filter-group h3 { font-family: 'Manrope'; margin-bottom: 15px; font-size: 1.1rem; }
    
    .cat-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; font-weight: 500; margin-bottom: 5px; }
    .cat-item:hover, .cat-item.active { background: var(--primary); color: white; }
    .cat-item i { width: 20px; text-align: center; }

    .stock-filter { margin-top: 15px; }
    .stock-filter label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; font-size: 0.9rem; }
    .stock-filter input[type="checkbox"] { accent-color: var(--primary); }

    /* Advanced Cards */
    .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
    
    .p-card { 
      background: white; border-radius: 24px; overflow: hidden; position: relative;
      border: 1px solid var(--border); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex; flex-direction: column;
    }
    .p-card:hover { transform: translateY(-12px); box-shadow: var(--shadow-lg); border-color: var(--primary); }

    .p-img { position: relative; height: 240px; overflow: hidden; background: #f8fafc; }
    .p-img img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
    .p-card:hover .p-img img { transform: scale(1.1); }

    .p-tag { position: absolute; top: 15px; left: 15px; background: var(--primary); color: white; padding: 5px 12px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; z-index: 2; }
    .p-tag.sale { background: var(--red); }
    .p-tag.hot { background: linear-gradient(135deg, #ff6b6b, #ee5a6f); }
    .p-tag.new { background: linear-gradient(135deg, #4ecdc4, #44a08d); }
    .p-tag.bestseller { background: linear-gradient(135deg, #f093fb, #f5576c); }
    
    .featured-star { position: absolute; top: 15px; right: 15px; background: var(--orange); color: white; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; box-shadow: 0 4px 12px rgba(249,115,22,0.4); }
    
    .stock-badge { position: absolute; bottom: 15px; left: 15px; padding: 5px 10px; border-radius: 6px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; z-index: 2; }
    .stock-badge.in { background: rgba(34,197,94,0.9); color: white; }
    .stock-badge.low { background: rgba(249,115,22,0.9); color: white; }
    .stock-badge.out { background: rgba(239,68,68,0.9); color: white; }

    .wish-btn { position: absolute; top: 15px; right: 15px; background: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2; transition: 0.3s; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .wish-btn:hover { background: #fee2e2; color: #ef4444; }
    .wish-btn.active { background: #ef4444; color: white; }
    .p-card.featured .wish-btn { top: 55px; }

    .p-body { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
    .p-category { font-size: 0.75rem; color: var(--primary); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
    .p-body h3 { font-family: 'Manrope'; font-size: 1.2rem; margin-bottom: 8px; line-height: 1.3; }
    .p-body p { color: #64748b; font-size: 0.9rem; margin-bottom: 15px; line-height: 1.5; flex-grow: 1; }
    
    .p-footer { display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--bg); padding-top: 15px; margin-top: auto; }
    .p-price-wrap { display: flex; flex-direction: column; }
    .p-price { font-size: 1.4rem; font-weight: 800; color: var(--dark); }
    .p-price-orig { font-size: 0.85rem; color: #94a3b8; text-decoration: line-through; }
    .add-to-cart { background: var(--dark); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
    .add-to-cart:hover:not(:disabled) { background: var(--primary); transform: scale(1.05); }
    .add-to-cart:disabled { background: #cbd5e1; cursor: not-allowed; opacity: 0.6; }
    .add-to-cart.out-of-stock { background: var(--red); }

    /* Loading State */
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    
    .loading-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
    .skeleton-card { background: white; border-radius: 24px; overflow: hidden; border: 1px solid var(--border); }
    .skeleton-img { height: 240px; background: #e2e8f0; }
    .skeleton-body { padding: 20px; }
    .skeleton-text { height: 16px; background: #e2e8f0; border-radius: 4px; margin-bottom: 10px; }
    .skeleton-text.short { width: 60%; }

    /* Empty State */
    .empty-state { text-align: center; padding: 60px 20px; grid-column: 1 / -1; }
    .empty-state i { font-size: 4rem; color: #cbd5e1; margin-bottom: 20px; }
    .empty-state h3 { font-family: 'Manrope'; font-size: 1.5rem; margin-bottom: 10px; }
    .empty-state p { color: #64748b; }

    /* Cart Sidebar Styles */
    .cart-drawer { position: fixed; right: -450px; top: 0; width: 400px; height: 100vh; background: white; z-index: 2000; box-shadow: -10px 0 50px rgba(0,0,0,0.1); transition: 0.5s cubic-bezier(0.165, 0.84, 0.44, 1); display: flex; flex-direction: column; }
    .cart-drawer.active { right: 0; }
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 1999; display: none; }
    .cart-overlay.active { display: block; }

    .cart-item { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: var(--bg); padding: 15px; border-radius: 12px; }
    .cart-item img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; }
    .cart-item-info { flex-grow: 1; }
    .cart-item-info h4 { font-size: 0.95rem; margin-bottom: 4px; }
    .cart-item-info p { font-weight: 700; color: var(--primary); font-size: 0.9rem; }
    .qty-control { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
    .qty-btn { width: 28px; height: 28px; border: 1px solid var(--border); background: white; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .qty-btn:hover { border-color: var(--primary); color: var(--primary); }
    .remove-btn { color: #ef4444; cursor: pointer; font-size: 0.9rem; transition: 0.2s; }
    .remove-btn:hover { transform: scale(1.1); }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .mobile-filters { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; }
      .mobile-filter-btn { white-space: nowrap; padding: 8px 16px; background: white; border: 1px solid var(--border); border-radius: 20px; font-size: 0.85rem; cursor: pointer; }
      .mobile-filter-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    }
    @media (min-width: 901px) { .mobile-filters { display: none; } }
  </style>
</head>
<body>

  <header>
    <div class="nav-container">
      <a href="index.html" class="logo"><img src="https://i.postimg.cc/wxFxvbyf/RARE-GRADE-LOGO-blue.png"></a>
      
      <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search hardware, software or services..." onkeyup="filterProducts()">
      </div>

      <div class="nav-actions">
        <div class="nav-btn" title="Wishlist"><i class="far fa-heart"></i><span class="badge-count" id="wishCount">0</span></div>
        <div class="nav-btn" id="cartToggle" title="Cart"><i class="fas fa-shopping-cart"></i><span class="badge-count" id="cartCount">0</span></div>
      </div>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="filter-group">
        <h3>Categories</h3>
        <div class="cat-item active" onclick="filterCategory('all', this)"><i class="fas fa-layer-group"></i> All Products</div>
        <div class="cat-item" onclick="filterCategory('hardware', this)"><i class="fas fa-laptop"></i> Hardware</div>
        <div class="cat-item" onclick="filterCategory('software', this)"><i class="fas fa-code"></i> Software Dev</div>
        <div class="cat-item" onclick="filterCategory('security', this)"><i class="fas fa-shield-alt"></i> Security</div>
        <div class="cat-item" onclick="filterCategory('accessories', this)"><i class="fas fa-plug"></i> Accessories</div>
      </div>

      <div class="filter-group">
        <h3>Filter by Price</h3>
        <input type="range" min="0" max="100000" value="100000" style="width: 100%; accent-color: var(--primary);" id="priceRange" oninput="filterProducts()">
        <p style="margin-top: 10px; font-weight: 700;">Up to: <span id="priceVal">R 100,000</span></p>
      </div>

      <div class="filter-group">
        <h3>Stock Status</h3>
        <div class="stock-filter">
          <label><input type="checkbox" id="showInStock" checked onchange="filterProducts()"> In Stock</label>
          <label><input type="checkbox" id="showLowStock" checked onchange="filterProducts()"> Low Stock</label>
          <label><input type="checkbox" id="showOutOfStock" onchange="filterProducts()"> Out of Stock</label>
        </div>
      </div>
    </aside>

    <div>
      <!-- Mobile Category Filter -->
      <div class="mobile-filters" id="mobileFilters">
        <button class="mobile-filter-btn active" onclick="filterCategory('all', this)">All</button>
        <button class="mobile-filter-btn" onclick="filterCategory('hardware', this)">Hardware</button>
        <button class="mobile-filter-btn" onclick="filterCategory('software', this)">Software</button>
        <button class="mobile-filter-btn" onclick="filterCategory('security', this)">Security</button>
        <button class="mobile-filter-btn" onclick="filterCategory('accessories', this)">Accessories</button>
      </div>

      <div class="product-grid" id="productGrid">
        <!-- Loading Skeleton -->
        <div class="skeleton-card"><div class="skeleton-img skeleton"></div><div class="skeleton-body"><div class="skeleton-text skeleton"></div><div class="skeleton-text short skeleton"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-img skeleton"></div><div class="skeleton-body"><div class="skeleton-text skeleton"></div><div class="skeleton-text short skeleton"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-img skeleton"></div><div class="skeleton-body"><div class="skeleton-text skeleton"></div><div class="skeleton-text short skeleton"></div></div></div>
        <div class="skeleton-card"><div class="skeleton-img skeleton"></div><div class="skeleton-body"><div class="skeleton-text skeleton"></div><div class="skeleton-text short skeleton"></div></div></div>
      </div>
    </div>
  </main>

  <div class="cart-overlay" id="overlay" onclick="toggleCart()"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div style="padding: 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
      <h2 style="font-family: 'Manrope';">Your Cart <span id="cartItemCount" style="font-size: 0.9rem; color: #64748b; font-weight: 400;">(0 items)</span></h2>
      <button onclick="toggleCart()" style="background:none; border:none; font-size: 1.5rem; cursor:pointer; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s;">&times;</button>
    </div>
    <div id="cartItems" style="flex-grow: 1; padding: 25px; overflow-y: auto;">
      <div style="text-align: center; color: #94a3b8; margin-top: 40px;">
        <i class="fas fa-shopping-basket" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.3;"></i>
        <p>Your cart is empty</p>
      </div>
    </div>
    <div style="padding: 25px; background: var(--bg); border-top: 1px solid var(--border);">
      <div style="display: flex; justify-content: space-between; font-weight: 800; font-size: 1.3rem; margin-bottom: 20px; font-family: 'Manrope';">
        <span>Total</span><span id="totalPrice">R 0.00</span>
      </div>
      <button onclick="checkout()" style="width:100%; padding: 16px; background: var(--primary); color: white; border:none; border-radius: 12px; font-weight: 700; cursor:pointer; font-size: 1rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <i class="fab fa-whatsapp"></i> Order via WhatsApp
      </button>
      <p style="text-align: center; font-size: 0.75rem; color: #64748b; margin-top: 12px;">You'll be redirected to WhatsApp to complete your order</p>
    </div>
  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    // Firebase Configuration (Same as admin panel)
    const firebaseConfig = {
      apiKey: "AIzaSyAxBT0oESoL62oz_x_Z8cMtdENWZPx4tMI",
      authDomain: "pinotp-d7ef5.firebaseapp.com",
      databaseURL: "https://pinotp-d7ef5-default-rtdb.firebaseio.com",
      projectId: "pinotp-d7ef5",
      storageBucket: "pinotp-d7ef5.firebasestorage.app",
      messagingSenderId: "708458917827",
      appId: "1:708458917827:web:375de278577df0adcf9776"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // State
    let allProducts = [];
    let cart = [];
    let currentCategory = 'all';
    let wishlist = new Set();

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      loadProducts();
      loadCartFromStorage();
    });

    // Load Products from Firebase
    function loadProducts() {
      db.ref('websiteContent/shop').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && Array.isArray(data)) {
          // Filter only visible products for the shop
          allProducts = data.filter(p => p.visible !== false);
        } else {
          allProducts = [];
        }
        filterProducts();
      }, (error) => {
        console.error('Error loading products:', error);
        document.getElementById('productGrid').innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <i class="fas fa-exclamation-circle"></i>
            <h3>Failed to load products</h3>
            <p>Please check your internet connection and try again.</p>
          </div>
        `;
      });
    }

    // Render Products
    function renderProducts(products) {
      const grid = document.getElementById('productGrid');
      
      if (products.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-box-open"></i>
            <h3>No products found</h3>
            <p>Try adjusting your filters or search query.</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = products.map(p => {
        const isOutOfStock = p.stock === 'out';
        const hasOriginalPrice = p.priceOrig && p.priceOrig > p.price;
        const isFeatured = p.featured;
        const isWishlisted = wishlist.has(p.id);
        
        // Tag styling
        let tagClass = '';
        let tagIcon = '';
        const tag = (p.tag || '').toLowerCase();
        if (tag.includes('hot')) { tagClass = 'hot'; tagIcon = '🔥'; }
        else if (tag.includes('new')) { tagClass = 'new'; tagIcon = '✨'; }
        else if (tag.includes('best')) { tagClass = 'bestseller'; tagIcon = '⭐'; }
        else if (tag.includes('sale')) { tagClass = 'sale'; tagIcon = '🏷'; }
        
        // Stock badge
        let stockBadge = '';
        if (p.stock === 'out') stockBadge = '<span class="stock-badge out">Out of Stock</span>';
        else if (p.stock === 'low') stockBadge = '<span class="stock-badge low">Low Stock</span>';
        else stockBadge = '<span class="stock-badge in">In Stock</span>';

        return `
          <div class="p-card ${isFeatured ? 'featured' : ''}" data-id="${p.id}">
            ${p.tag ? `<div class="p-tag ${tagClass}">${tagIcon} ${p.tag}</div>` : ''}
            ${isFeatured ? '<div class="featured-star"><i class="fas fa-star"></i></div>' : ''}
            <button class="wish-btn ${isWishlisted ? 'active' : ''}" onclick="toggleWish('${p.id}', this)">
              <i class="${isWishlisted ? 'fas' : 'far'} fa-heart"></i>
            </button>
            
            <div class="p-img">
              ${p.image ? `<img src="${p.image}" alt="${p.name}" loading="lazy">` : 
                `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#f1f5f9;color:#94a3b8;"><i class="fas fa-image" style="font-size:3rem;"></i></div>`}
              ${stockBadge}
            </div>
            
            <div class="p-body">
              <div class="p-category">${p.category || 'Product'}</div>
              <h3>${p.name || 'Untitled Product'}</h3>
              <p>${p.desc || 'No description available.'}</p>
              
              <div class="p-footer">
                <div class="p-price-wrap">
                  <span class="p-price">R ${Number(p.price || 0).toLocaleString()}</span>
                  ${hasOriginalPrice ? `<span class="p-price-orig">R ${Number(p.priceOrig).toLocaleString()}</span>` : ''}
                </div>
                <button class="add-to-cart ${isOutOfStock ? 'out-of-stock' : ''}" 
                        onclick="${isOutOfStock ? '' : `addToCart('${p.id}')`}" 
                        ${isOutOfStock ? 'disabled' : ''}>
                  <i class="fas ${isOutOfStock ? 'fa-times' : 'fa-cart-plus'}"></i>
                  ${isOutOfStock ? 'Out of Stock' : 'Add to Cart'}
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    // Filter Products
    function filterProducts() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const maxPrice = parseInt(document.getElementById('priceRange').value);
      const showInStock = document.getElementById('showInStock').checked;
      const showLowStock = document.getElementById('showLowStock').checked;
      const showOutOfStock = document.getElementById('showOutOfStock').checked;

      document.getElementById('priceVal').innerText = `R ${maxPrice.toLocaleString()}`;

      const filtered = allProducts.filter(p => {
        const matchesCat = currentCategory === 'all' || p.category === currentCategory;
        const matchesSearch = !query || (p.name || '').toLowerCase().includes(query) || (p.desc || '').toLowerCase().includes(query);
        const matchesPrice = (p.price || 0) <= maxPrice;
        
        let matchesStock = false;
        if (p.stock === 'in' && showInStock) matchesStock = true;
        if (p.stock === 'low' && showLowStock) matchesStock = true;
        if (p.stock === 'out' && showOutOfStock) matchesStock = true;
        if (!p.stock && showInStock) matchesStock = true; // Default to in stock

        return matchesCat && matchesSearch && matchesPrice && matchesStock;
      });

      renderProducts(filtered);
    }

    function filterCategory(cat, el) {
      currentCategory = cat;
      
      // Update desktop sidebar
      document.querySelectorAll('.sidebar .cat-item').forEach(i => i.classList.remove('active'));
      if (el && el.classList) el.classList.add('active');
      
      // Update mobile filters
      document.querySelectorAll('.mobile-filter-btn').forEach(i => i.classList.remove('active'));
      const mobileBtn = Array.from(document.querySelectorAll('.mobile-filter-btn')).find(b => b.textContent.toLowerCase().includes(cat === 'all' ? 'all' : cat));
      if (mobileBtn) mobileBtn.classList.add('active');
      
      filterProducts();
    }

    // Cart Functions
    function addToCart(productId) {
      const product = allProducts.find(p => p.id === productId);
      if (!product) return;
      
      const existingItem = cart.find(item => item.id === productId);
      if (existingItem) {
        existingItem.quantity++;
      } else {
        cart.push({ ...product, quantity: 1 });
      }
      
      saveCartToStorage();
      updateCartUI();
      toggleCart(true);
      showToast('Added to cart!', 'success');
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      saveCartToStorage();
      updateCartUI();
    }

    function updateQuantity(index, change) {
      cart[index].quantity += change;
      if (cart[index].quantity <= 0) {
        removeFromCart(index);
      } else {
        saveCartToStorage();
        updateCartUI();
      }
    }

    function updateCartUI() {
      const cartCount = document.getElementById('cartCount');
      const cartItemCount = document.getElementById('cartItemCount');
      const cartItems = document.getElementById('cartItems');
      const totalPrice = document.getElementById('totalPrice');
      
      const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
      cartCount.innerText = totalItems;
      cartItemCount.innerText = `(${totalItems} item${totalItems !== 1 ? 's' : ''})`;
      
      if (cart.length === 0) {
        cartItems.innerHTML = `
          <div style="text-align: center; color: #94a3b8; margin-top: 40px;">
            <i class="fas fa-shopping-basket" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.3;"></i>
            <p>Your cart is empty</p>
          </div>
        `;
        totalPrice.innerText = 'R 0.00';
        return;
      }
      
      cartItems.innerHTML = cart.map((item, index) => `
        <div class="cart-item">
          <img src="${item.image || 'https://via.placeholder.com/70'}" alt="${item.name}">
          <div class="cart-item-info">
            <h4>${item.name}</h4>
            <p>R ${Number(item.price).toLocaleString()}</p>
            <div class="qty-control">
              <button class="qty-btn" onclick="updateQuantity(${index}, -1)"><i class="fas fa-minus"></i></button>
              <span style="font-weight: 600; min-width: 20px; text-align: center;">${item.quantity}</span>
              <button class="qty-btn" onclick="updateQuantity(${index}, 1)"><i class="fas fa-plus"></i></button>
            </div>
          </div>
          <i class="fas fa-trash remove-btn" onclick="removeFromCart(${index})"></i>
        </div>
      `).join('');
      
      const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      totalPrice.innerText = `R ${total.toLocaleString()}`;
    }

    function toggleCart(forceOpen = false) {
      const drawer = document.getElementById('cartDrawer');
      const overlay = document.getElementById('overlay');
      
      if (forceOpen) {
        drawer.classList.add('active');
        overlay.classList.add('active');
      } else {
        drawer.classList.toggle('active');
        overlay.classList.toggle('active');
      }
    }

    // Wishlist Functions
    function toggleWish(productId, btn) {
      if (wishlist.has(productId)) {
        wishlist.delete(productId);
        btn.classList.remove('active');
        btn.innerHTML = '<i class="far fa-heart"></i>';
      } else {
        wishlist.add(productId);
        btn.classList.add('active');
        btn.innerHTML = '<i class="fas fa-heart"></i>';
      }
      document.getElementById('wishCount').innerText = wishlist.size;
    }

    // Checkout via WhatsApp
    function checkout() {
      if (cart.length === 0) return;
      
      let message = 'Hello MTech Solutions! I would like to order:\n\n';
      let total = 0;
      
      cart.forEach(item => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;
        message += `• ${item.name} x${item.quantity} - R ${itemTotal.toLocaleString()}\n`;
      });
      
      message += `\n*Total: R ${total.toLocaleString()}*\n\nPlease confirm availability.`;
      
      const encodedMessage = encodeURIComponent(message);
      window.open(`https://wa.me/27821234567?text=${encodedMessage}`, '_blank');
    }

    // Storage Helpers
    function saveCartToStorage() {
      localStorage.setItem('mtech_cart', JSON.stringify(cart));
    }

    function loadCartFromStorage() {
      const saved = localStorage.getItem('mtech_cart');
      if (saved) {
        cart = JSON.parse(saved);
        updateCartUI();
      }
    }

    // Toast Notification
    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
        background: ${type === 'success' ? '#22c55e' : '#ef4444'}; color: white; padding: 12px 24px;
        border-radius: 8px; font-weight: 600; z-index: 9999; opacity: 0; transition: all 0.3s;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      `;
      toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check' : 'fa-exclamation'}"></i> ${message}`;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '1';
        toast.style.transform = 'translateX(-50%) translateY(0)';
      }, 10);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(-50%) translateY(100px)';
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    // Event Listeners
    document.getElementById('cartToggle').onclick = () => toggleCart();
  </script>
</body>
</html>
